version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml
# Spins up a PostgreSQL instance pre-configured for the ETL pipeline.
#
# Usage:
#   docker compose up -d          # start in the background
#   docker compose down           # stop and remove containers
#   docker compose down -v        # also delete the data volume
# ──────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:15-alpine
    container_name: sales_etl_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sales_db
      POSTGRES_USER:     etl_user
      POSTGRES_PASSWORD: etl_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Automatically execute schema on first startup
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d sales_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
    driver: local
